<!DOCTYPE html>
<html lang="es-CL">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<title>Clinera · Chat IA</title>
<meta name="description" content="Demo del Chat IA interno de Clinera + Modo Soporte con Cuky." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
:root{
  --ink:#111111;
  --ink-2:#1F2937;
  --muted:#6B6B6B;
  --muted-2:#9CA3AF;
  --line:#EAEAEA;
  --line-2:#F3F4F6;
  --bg:#FFFFFF;
  --cyan:#009FE3;
  --violet:#7C3AED;
  --magenta:#C850C0;
  --green:#10B981;
  --amber:#F59E0B;
  --sans:'Outfit',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --mono:'JetBrains Mono',ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--ink);font-family:var(--sans);min-height:100dvh}
body{font-feature-settings:'kern','liga','ss01';-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;overflow-x:hidden}
::selection{background:var(--ink);color:#fff}
button{font:inherit;color:inherit;background:none;border:0;cursor:pointer}

/* ============== TOP BAR ============== */
.topbar{
  position:sticky;top:0;z-index:30;background:rgba(255,255,255,.85);
  backdrop-filter:saturate(180%) blur(14px);-webkit-backdrop-filter:saturate(180%) blur(14px);
  border-bottom:1px solid var(--line);
}
.topbar-inner{
  max-width:1180px;margin:0 auto;padding:14px 28px;
  display:flex;align-items:center;justify-content:space-between;gap:24px;
}
.brand-mark{display:flex;align-items:center;gap:7px;font-weight:700;font-size:15.5px;letter-spacing:-.01em;color:var(--ink)}
.brand-mark .b-dot{width:5px;height:5px;border-radius:50%;background:var(--violet);display:inline-block}

/* Mode toggle */
.mode-toggle{
  display:inline-flex;background:var(--line-2);border-radius:11px;padding:4px;
  border:1px solid var(--line);
}
.mode-opt{
  padding:7px 16px;border-radius:8px;font-size:13px;color:var(--muted);font-weight:500;
  display:inline-flex;align-items:center;gap:7px;cursor:pointer;transition:background .2s,color .2s;
  letter-spacing:-.005em;
}
.mode-opt svg{width:15px;height:15px}
.mode-opt.active{background:#fff;color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.06)}
.mode-opt:not(.active):hover{color:var(--ink-2)}

/* Cuky pill (top-right) */
.cuky-pill{
  display:inline-flex;align-items:center;gap:10px;padding:5px 14px 5px 5px;
  border-radius:999px;background:#fff;border:1px solid var(--line);
}
.cuky-pill-av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#67D7E8 0%,#A78BFA 50%,#C850C0 100%);display:grid;place-items:center;overflow:hidden;position:relative;flex-shrink:0}
.cuky-pill-av img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.cuky-pill-av .cuky-fallback{font-weight:700;color:#fff;font-size:13px;letter-spacing:-.02em}
.cuky-pill-name{font-size:12.5px;font-weight:600;color:var(--ink);line-height:1.1;letter-spacing:-.005em}
.cuky-pill-role{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;font-weight:500}

/* ============== MAIN STAGE ============== */
.stage{
  max-width:780px;margin:0 auto;padding:80px 28px 64px;
  min-height:calc(100dvh - 70px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:30px;
}

/* Cuky hero card (visible solo en Modo Soporte) */
.cuky-hero{
  display:none;flex-direction:column;align-items:center;gap:14px;text-align:center;
  margin-bottom:0;
}
body[data-mode="soporte"] .cuky-hero{display:flex}
.cuky-hero-av{
  width:96px;height:96px;border-radius:50%;
  background:linear-gradient(135deg,#67D7E8 0%,#A78BFA 50%,#C850C0 100%);
  display:grid;place-items:center;overflow:hidden;position:relative;
  box-shadow:0 14px 40px -16px rgba(124,58,237,.45);
}
.cuky-hero-av img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.cuky-hero-av .cuky-fallback{
  font-weight:700;color:#fff;font-size:40px;letter-spacing:-.04em;font-family:var(--sans);
}
.cuky-hero-name{font-family:var(--mono);font-size:10.5px;color:var(--violet);letter-spacing:.14em;text-transform:uppercase;font-weight:600}

/* Greeting */
.greeting{
  font-size:38px;font-weight:500;color:var(--ink);letter-spacing:-.02em;
  text-align:center;line-height:1.1;
}
.greeting .accent{color:var(--violet);font-weight:600}

/* Input bar */
.input-wrap{width:100%;max-width:760px;display:flex;flex-direction:column;gap:18px;align-items:center}
.input{
  width:100%;background:#fff;border:1px solid var(--line);border-radius:32px;
  padding:7px 7px 7px 16px;display:flex;align-items:center;gap:6px;
  box-shadow:0 8px 32px -16px rgba(11,11,15,.14);
  transition:box-shadow .25s,border-color .25s;
  min-height:54px;
}
.input.focused{border-color:rgba(124,58,237,.35);box-shadow:0 10px 36px -10px rgba(124,58,237,.22)}
.input-plus{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;color:var(--muted);font-size:22px;font-weight:300;line-height:0;flex-shrink:0}
.input-plus:hover{background:var(--line-2);color:var(--ink)}
.input-field{flex:1;padding:0 6px;font-size:15.5px;color:var(--ink);min-height:34px;display:flex;align-items:center;font-family:var(--sans);background:transparent;border:0;outline:0;letter-spacing:-.005em}
.input-field::placeholder{color:#9CA3AF}
.input-model{display:inline-flex;align-items:center;gap:5px;font-size:13.5px;color:var(--muted);font-weight:500;padding:6px 10px;flex-shrink:0;cursor:default}
.input-model .chev{font-size:9px;color:var(--muted-2)}
.input-mic,.input-send{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;flex-shrink:0;cursor:pointer;transition:background .2s}
.input-mic{color:var(--ink)}
.input-mic:hover{background:var(--line-2)}
.input-mic svg{width:17px;height:17px}
.input-send{background:var(--ink);color:#fff;margin-left:2px}
.input-send:hover{transform:scale(1.04)}
.input-send svg{width:16px;height:16px}

/* Quick chips */
.chips{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.chip{
  display:inline-flex;align-items:center;gap:8px;
  padding:10px 18px;background:#fff;border:1px solid var(--line);
  border-radius:999px;font-size:13px;color:var(--ink);font-weight:500;
  cursor:pointer;transition:background .15s,border-color .15s,transform .15s;
  letter-spacing:-.005em;
}
.chip:hover{background:var(--line-2);border-color:var(--muted-2)}
.chip:active{transform:scale(.98)}
.chip svg{width:15px;height:15px;color:var(--muted);flex-shrink:0}

/* Hide chips per mode */
.chips-ia{display:flex}
.chips-soporte{display:none}
body[data-mode="soporte"] .chips-ia{display:none}
body[data-mode="soporte"] .chips-soporte{display:flex}

/* ============== CONVERSATION (after send) ============== */
.conv{
  width:100%;max-width:760px;margin:0 auto;display:none;flex-direction:column;gap:16px;text-align:left;
  padding:20px 4px;
}
.conv.visible{display:flex;animation:convFade .4s ease-out}
@keyframes convFade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.msg{display:flex;flex-direction:column;gap:5px;max-width:90%}
.msg.user{align-self:flex-end;background:#F3F4F6;color:var(--ink);padding:11px 16px;border-radius:18px;font-size:14.5px;line-height:1.4;font-weight:500;max-width:78%}
.msg.ai{align-self:flex-start;width:100%}
.msg.ai-head{
  display:flex;align-items:center;gap:9px;margin-bottom:5px;
}
.msg.ai-head .ai-av{
  width:26px;height:26px;border-radius:50%;
  background:linear-gradient(135deg,var(--cyan),var(--violet),var(--magenta));
  display:grid;place-items:center;color:#fff;font-weight:700;font-size:11px;
}
body[data-mode="soporte"] .msg.ai-head .ai-av{
  background:linear-gradient(135deg,#67D7E8 0%,#A78BFA 50%,#C850C0 100%);overflow:hidden;position:relative;
}
body[data-mode="soporte"] .msg.ai-head .ai-av img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.msg.ai-head .ai-name{font-size:12px;color:var(--muted);font-weight:500;letter-spacing:-.005em}
.msg-typing{display:inline-flex;gap:5px;padding:11px 16px;background:#fff;border:1px solid var(--line);border-radius:16px;align-items:center;align-self:flex-start}
.msg-typing span{width:7px;height:7px;border-radius:50%;background:#9CA3AF;animation:bub 1.2s infinite}
.msg-typing span:nth-child(2){animation-delay:.15s}
.msg-typing span:nth-child(3){animation-delay:.3s}
@keyframes bub{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-2px)}}
.msg-typing.hidden{display:none}
.msg-text{font-size:14px;color:var(--ink-2);line-height:1.65;padding:4px 2px;display:none}
.msg-text.visible{display:block;animation:textFade .4s ease-out}
@keyframes textFade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.msg-text .lead{color:var(--ink);font-weight:600;font-size:14.5px;display:block;margin-bottom:10px}
.msg-text ul{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:6px}
.msg-text ul li{padding-left:15px;position:relative;font-size:13.5px;color:var(--ink-2);line-height:1.5}
.msg-text ul li::before{content:"•";position:absolute;left:0;color:var(--violet);font-weight:700}
.msg-text ul li b{color:var(--ink);font-weight:600}
.msg-text ul li .meta{font-family:var(--mono);font-size:11px;color:var(--muted);margin-left:6px}
.msg-text .total{font-family:var(--mono);font-size:11.5px;color:var(--violet);font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-top:14px;padding-top:11px;border-top:1px solid var(--line)}
.msg-text p{margin:0 0 8px;font-size:13.5px;line-height:1.5}
.msg-text p:last-child{margin-bottom:0}

/* Reset button to go back to empty state */
.reset-btn{
  display:inline-flex;align-items:center;gap:7px;
  padding:8px 14px;background:#fff;border:1px solid var(--line);
  border-radius:999px;font-size:12.5px;color:var(--muted);font-weight:500;
  cursor:pointer;align-self:center;margin-top:6px;
  transition:background .15s,color .15s;
}
.reset-btn:hover{background:var(--line-2);color:var(--ink)}
.reset-btn svg{width:12px;height:12px}

/* Footer */
.foot{
  max-width:780px;margin:0 auto;padding:24px 28px 36px;
  display:flex;justify-content:center;align-items:center;gap:14px;
  font-family:var(--mono);font-size:10.5px;color:var(--muted-2);letter-spacing:.06em;text-transform:uppercase;
}
.foot .sep{width:1px;height:12px;background:var(--line)}

/* Responsive */
@media (max-width:680px){
  .topbar-inner{padding:12px 16px;gap:10px;flex-wrap:wrap}
  .stage{padding:50px 18px 32px;gap:22px;min-height:auto}
  .greeting{font-size:28px}
  .mode-opt{padding:6px 12px;font-size:12px}
  .input{padding:6px 6px 6px 12px}
  .input-field{font-size:14px}
  .input-model{font-size:12px;padding:5px 8px}
  .input-model .chev{display:none}
  .chip{padding:8px 14px;font-size:12px}
  .cuky-pill-name,.cuky-pill-role{display:none}
  .cuky-hero-av{width:80px;height:80px}
  .cuky-hero-av .cuky-fallback{font-size:34px}
}
</style>
</head>
<body data-mode="ia">

<!-- ============ TOP BAR ============ -->
<header class="topbar">
  <div class="topbar-inner">
    <a class="brand-mark" href="https://www.clinera.io">clinera<span class="b-dot"></span>io</a>

    <div class="mode-toggle" id="modeToggle">
      <button class="mode-opt active" data-mode="ia">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L13.5 8.5 20 10l-6.5 1.5L12 18l-1.5-6.5L4 10l6.5-1.5L12 2z"/></svg>
        Modo IA
      </button>
      <button class="mode-opt" data-mode="soporte">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 11a9 9 0 0 1 18 0v3a2 2 0 0 1-2 2h-1v-5h3"/>
          <path d="M21 11v3a2 2 0 0 1-2 2h-1"/>
          <path d="M3 11v3a2 2 0 0 0 2 2h1v-5H3z"/>
        </svg>
        Modo Soporte
      </button>
    </div>

    <div class="cuky-pill" title="Cuky · mascota Clinera">
      <div class="cuky-pill-av">
        <img src="/agents/cuky.png" alt="Cuky" onerror="this.style.display='none'" />
        <span class="cuky-fallback">C</span>
      </div>
      <div>
        <div class="cuky-pill-name">Cuky</div>
        <div class="cuky-pill-role">Asistente</div>
      </div>
    </div>
  </div>
</header>

<!-- ============ STAGE ============ -->
<main class="stage" id="stage">

  <!-- Cuky hero (visible solo en Modo Soporte) -->
  <div class="cuky-hero">
    <div class="cuky-hero-av">
      <img src="/agents/cuky.png" alt="Cuky" onerror="this.style.display='none'" />
      <span class="cuky-fallback">C</span>
    </div>
    <div class="cuky-hero-name">CUKY · ASISTENTE DE SOPORTE</div>
  </div>

  <!-- Greeting -->
  <h1 class="greeting" id="greeting">¿Por dónde empezamos?</h1>

  <!-- Input + chips -->
  <div class="input-wrap">

    <form class="input" id="inputForm" autocomplete="off">
      <button type="button" class="input-plus" title="Adjuntar">+</button>
      <input class="input-field" id="inputField" type="text" placeholder="Pregunta lo que quieras" />
      <button type="button" class="input-model" title="Modelo">Thinking <span class="chev">▾</span></button>
      <button type="button" class="input-mic" title="Hablar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="3" width="6" height="12" rx="3"/>
          <path d="M5 11v1a7 7 0 0 0 14 0v-1"/>
          <line x1="12" y1="19" x2="12" y2="22"/>
          <line x1="8" y1="22" x2="16" y2="22"/>
        </svg>
      </button>
      <button type="submit" class="input-send" title="Enviar">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <rect x="4" y="9" width="2" height="6" rx="1"/>
          <rect x="8" y="6" width="2" height="12" rx="1"/>
          <rect x="12" y="3" width="2" height="18" rx="1"/>
          <rect x="16" y="7" width="2" height="10" rx="1"/>
          <rect x="20" y="10" width="2" height="4" rx="1"/>
        </svg>
      </button>
    </form>

    <!-- Quick chips · Modo IA -->
    <div class="chips chips-ia">
      <button class="chip" data-prompt="¿cuál es el resumen del día de hoy?">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Resumen del día
      </button>
      <button class="chip" data-prompt="muéstrame los pacientes morosos">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        Mostrar morosos
      </button>
      <button class="chip" data-prompt="buscar paciente">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Buscar paciente
      </button>
    </div>

    <!-- Quick chips · Modo Soporte -->
    <div class="chips chips-soporte">
      <button class="chip" data-prompt="¿cómo activo AURA en mi clínica?">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
        Activar AURA
      </button>
      <button class="chip" data-prompt="¿cómo importo mi base de pacientes desde otro software?">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Importar pacientes
      </button>
      <button class="chip" data-prompt="¿cómo cambio el plan de suscripción?">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        Cambiar plan
      </button>
    </div>

  </div>

  <!-- Conversation (aparece tras enviar) -->
  <div class="conv" id="conv">
    <div class="msg user" id="convUser"></div>
    <div class="msg ai">
      <div class="ai-head">
        <div class="ai-av" id="aiAv">
          <img src="/agents/cuky.png" alt="" onerror="this.style.display='none'" />
          <span class="cuky-fallback" id="aiAvFallback">C</span>
        </div>
        <span class="ai-name" id="aiName">Clinera · Chat IA</span>
      </div>
      <div class="msg-typing" id="convTyping"><span></span><span></span><span></span></div>
      <div class="msg-text" id="convText"></div>
    </div>
    <button class="reset-btn" id="resetBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
      Empezar de nuevo
    </button>
  </div>

</main>

<footer class="foot">
  <span>Clinera · Chat IA · Demo</span>
  <span class="sep"></span>
  <span>Cuky · mascota oficial</span>
</footer>

<script>
  // ============ Mode toggle ============
  const body = document.body;
  const modeButtons = document.querySelectorAll('.mode-opt');
  const greeting = document.getElementById('greeting');
  const inputField = document.getElementById('inputField');
  const aiName = document.getElementById('aiName');

  const MODES = {
    ia: {
      greeting: '¿Por dónde empezamos?',
      placeholder: 'Pregunta lo que quieras',
      aiName: 'Clinera · Chat IA',
      fallback: 'C',
    },
    soporte: {
      greeting: '¡Hola! Soy Cuky.',
      placeholder: '¿Con qué te ayudo hoy?',
      aiName: 'Cuky · Soporte Clinera',
      fallback: 'C',
    },
  };

  function setMode(mode) {
    body.dataset.mode = mode;
    modeButtons.forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
    const cfg = MODES[mode];
    greeting.textContent = cfg.greeting;
    inputField.placeholder = cfg.placeholder;
    aiName.textContent = cfg.aiName;
    resetConv();
  }

  modeButtons.forEach(b => {
    b.addEventListener('click', () => setMode(b.dataset.mode));
  });

  // ============ Conversation ============
  const inputForm = document.getElementById('inputForm');
  const conv = document.getElementById('conv');
  const convUser = document.getElementById('convUser');
  const convTyping = document.getElementById('convTyping');
  const convText = document.getElementById('convText');
  const resetBtn = document.getElementById('resetBtn');

  function resetConv() {
    conv.classList.remove('visible');
    convTyping.classList.remove('hidden');
    convText.classList.remove('visible');
    convText.innerHTML = '';
    convUser.textContent = '';
    inputField.value = '';
    inputField.focus();
  }

  resetBtn.addEventListener('click', resetConv);

  // Respuestas demo según la pregunta y el modo
  function getDemoAnswer(question, mode) {
    const q = question.toLowerCase();

    if (mode === 'soporte') {
      if (q.includes('aura')) {
        return `
          <span class="lead">Activar AURA en 3 pasos:</span>
          <ul>
            <li><b>1.</b> Andá a <b>Mi Equipo → AURA</b> y prendé el switch.</li>
            <li><b>2.</b> Conectá tu número de WhatsApp Business (te guío con el QR).</li>
            <li><b>3.</b> Agregá tus promos en el <b>Modo Fácil</b> — listo.</li>
          </ul>
          <p style="margin-top:10px">En menos de 5 minutos AURA queda atendiendo. Si algo no aparece, escribime de nuevo.</p>
        `;
      }
      if (q.includes('importar') || q.includes('paciente')) {
        return `
          <span class="lead">Importar pacientes desde otro software:</span>
          <ul>
            <li><b>CSV / Excel</b> — andá a Pacientes → Importar → subí el archivo.</li>
            <li><b>AgendaPro</b> · <b>Dentalink</b> · <b>Medilink</b> — tenemos plantilla auto-mapeada.</li>
            <li>El equipo de migración revisa tu archivo en menos de 24h y lo deja listo.</li>
          </ul>
          <p style="margin-top:10px">Si querés que migremos nosotros, sin costo: respondé con tu plan actual y te coordino con el equipo.</p>
        `;
      }
      if (q.includes('plan') || q.includes('suscrip')) {
        return `
          <span class="lead">Cambiar plan en Clinera:</span>
          <ul>
            <li>Andá a <b>Configuración → Plan y facturación</b>.</li>
            <li>Elegí Vortex, Atlas o Summit — el cambio aplica en el siguiente ciclo.</li>
            <li>Si bajás de plan, los datos no se pierden — solo se ajusta el límite mensual.</li>
          </ul>
          <p style="margin-top:10px">Cualquier duda, te conecto con ventas: <b>+56 9 8558 1524</b>.</p>
        `;
      }
      return `
        <span class="lead">Estoy revisando tu consulta.</span>
        <p>Mientras tanto, podés intentar con un tema más específico — por ejemplo: cómo activar AURA, cómo importar pacientes, cómo cambiar de plan.</p>
        <p style="margin-top:8px">Si nada de eso te sirve, escribime un email a <b>soporte@clinera.io</b> y te respondemos en menos de 1 hora hábil.</p>
      `;
    }

    // Modo IA
    if (q.includes('abono') || q.includes('moroso') || q.includes('pendiente') || q.includes('cobrar')) {
      return `
        <span class="lead">4 abonos pendientes esta semana:</span>
        <ul>
          <li><b>Camila P.</b> — $24.500<span class="meta">vence mañana</span></li>
          <li><b>Pedro R.</b> — $89.000<span class="meta">vence 16 may</span></li>
          <li><b>Ana M.</b> — $12.300<span class="meta">vence 18 may</span></li>
          <li><b>Luis A.</b> — $45.000<span class="meta">vence 20 may</span></li>
        </ul>
        <div class="total">Total · $170.800</div>
      `;
    }
    if (q.includes('resumen') || q.includes('hoy') || q.includes('día')) {
      return `
        <span class="lead">Resumen de hoy · ${new Date().toLocaleDateString('es-CL', { weekday: 'long', day: 'numeric', month: 'long' })}</span>
        <ul>
          <li><b>8 citas confirmadas</b> · 2 controles, 4 tratamientos, 2 evaluaciones</li>
          <li><b>1 hueco</b> a las 15:30 — LIA ya está buscando candidato</li>
          <li><b>$420.000</b> proyectados en caja</li>
          <li><b>3 leads</b> esperando respuesta — AURA respondió 2, 1 pasó a humano</li>
        </ul>
        <div class="total">Día sin imprevistos · todo en verde</div>
      `;
    }
    if (q.includes('buscar') || q.includes('paciente')) {
      return `
        <span class="lead">Decime el nombre o RUT del paciente.</span>
        <p>Por ejemplo: <b>"María Torres"</b>, <b>"18.456.789"</b>, o <b>"todos los que vinieron por Botox últimos 30 días"</b>.</p>
      `;
    }
    if (q.includes('venta') || q.includes('semana')) {
      return `
        <span class="lead">Ventas esta semana vs la pasada:</span>
        <ul>
          <li><b>Esta semana</b> · $3.420.000 · <span style="color:var(--green)">+18%</span></li>
          <li><b>Semana anterior</b> · $2.900.000</li>
          <li><b>Top tratamiento</b> · Limpieza facial (24%)</li>
          <li><b>Top profesional</b> · Dra. Meza ($1.860.000)</li>
        </ul>
        <div class="total">Mejor semana del trimestre</div>
      `;
    }
    if (q.includes('conversa') || q.includes('atenci')) {
      return `
        <span class="lead">3 conversaciones requieren tu mirada:</span>
        <ul>
          <li><b>Sofía R.</b> — pregunta por contraindicaciones de embarazo<span class="meta">médica · AURA pausada</span></li>
          <li><b>Diego F.</b> — quiere migrar de derma<span class="meta">lead alto · sin cerrar</span></li>
          <li><b>María T.</b> — dejó queja por demora<span class="meta">sin respuesta</span></li>
        </ul>
        <div class="total">Prioridad · alta</div>
      `;
    }
    if (q.includes('agenda') || q.includes('trata')) {
      return `
        <span class="lead">Tu agenda hoy:</span>
        <ul>
          <li><b>09:00</b> · Camila P. — Limpieza facial</li>
          <li><b>11:30</b> · Pedro R. — Botox primera vez</li>
          <li><b>16:00</b> · Luis A. — Control 3 meses</li>
        </ul>
        <div class="total">3 citas confirmadas</div>
      `;
    }
    return `
      <span class="lead">Tengo acceso a toda la operación de tu clínica.</span>
      <p>Probá preguntarme por <b>abonos pendientes</b>, <b>el resumen del día</b>, <b>ventas de la semana</b> o <b>tu agenda</b>.</p>
      <p style="margin-top:8px">Si querés que busque algo más específico, decímelo con palabras tuyas — yo me encargo de armar la consulta.</p>
    `;
  }

  function submitQuestion(question) {
    if (!question.trim()) return;
    convUser.textContent = question;
    conv.classList.add('visible');
    convTyping.classList.remove('hidden');
    convText.classList.remove('visible');
    convText.innerHTML = '';
    inputField.value = '';

    // Scroll into view
    setTimeout(() => conv.scrollIntoView({ behavior: 'smooth', block: 'center' }), 100);

    // Fake delay then show answer
    const mode = body.dataset.mode;
    setTimeout(() => {
      convTyping.classList.add('hidden');
      convText.innerHTML = getDemoAnswer(question, mode);
      convText.classList.add('visible');
    }, 1400 + Math.random() * 600);
  }

  // Form submit
  inputForm.addEventListener('submit', e => {
    e.preventDefault();
    submitQuestion(inputField.value);
  });

  // Focus styles
  inputField.addEventListener('focus', () => inputForm.classList.add('focused'));
  inputField.addEventListener('blur', () => inputForm.classList.remove('focused'));

  // Chips fill the input + submit
  document.querySelectorAll('.chip').forEach(c => {
    c.addEventListener('click', () => {
      const p = c.getAttribute('data-prompt') || c.textContent.trim();
      submitQuestion(p);
    });
  });

  // Focus on load
  setTimeout(() => inputField.focus(), 200);
</script>

</body>
</html>
